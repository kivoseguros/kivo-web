<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIVO Asistente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=3">
<style id="kivo-nohover">
/* KIVO: sin efecto hover en botones (solo hundido al pulsar) */
html button:hover,html [role="button"]:hover,html [class*="btn"]:hover,html [class*="button"]:hover,html [class*="cta"]:hover,html [class*="boton"]:hover,html .portal-tile:hover,html .kivo-fab-main:hover,html .kivo-fab-option:hover,html #kivo-top-btn:hover,html .s04-cta-btn:hover{transform:none!important;filter:none!important;}
</style>
<style id="kivo-press-fx">
/* Efecto PULSADO (hundido) — gana a los hover (KIVO) */
html button:active,html [role="button"]:active,html [onclick]:active,html input[type="submit"]:active,html input[type="button"]:active,html input[type="reset"]:active,html [class*="btn"]:active,html [class*="button"]:active,html [class*="cta"]:active,html [class*="boton"]:active,html [class*="tile"]:active,html [class*="chip"]:active,html .plan-selector:active,html .excl-item:active,html .otile:active,html .wtile:active,html .pbtn:active,html .sbtn:active,html .editbtn:active{transform:translateY(3px) scale(0.98)!important;box-shadow:0 2px 8px rgba(27,42,74,0.12),inset 0 3px 9px rgba(27,42,74,0.16)!important;transition:transform .06s ease,box-shadow .06s ease!important;}
</style>
</head>
<body>

<!-- Panel de chat -->
<div class="ia-panel" id="ia-panel">
  <div class="ia-head">
    <div class="ia-avatar"><img src="assets/ia.png" alt="KIVO IA"></div>
    <div style="flex:1">
      <div class="ia-name">KIVO IA</div>
      <div class="ia-status"><span class="ia-dot"></span>Asistente IA · En línea</div>
    </div>
    <button class="ia-btn-expand" onclick="toggleIAExpand()" title="Ampliar">
      <svg id="ia-expand-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6V2h4M2 2l4.5 4.5M14 10v4h-4M14 14l-4.5-4.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="ia-btn-close" onclick="toggleIA()" title="Cerrar">✕</button>
  </div>
  <div class="ia-msgs" id="ia-msgs">
    <div class="ia-bot">¡Hola! Soy el asistente IA de KIVO. Puedo ayudarte a entender las coberturas, comparar planes o resolver cualquier duda. ¿En qué te ayudo?</div>
  </div>
  <div class="ia-input-wrap">
    <input class="ia-input" type="text" id="ia-input" placeholder="Escribe tu pregunta…" onkeydown="if(event.key==='Enter')sendIA()">
    <button class="ia-send" onclick="sendIA()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M13 2L7.5 7.5M13 2l-4 11-1.5-5.5M13 2L2 6l5.5 1.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script src="js/asistente.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog KIVO — Legislación, salud, cuidados y seguros de mascotas</title>
  <meta name="description" content="Artículos sobre legislación, salud y cuidados para perros y gatos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1B2A4A;--green:#1B4D3E;--green-l:#3DBFA0;--green-bg:#EAF4EE;--gray:#F7F8FA;--border:rgba(27,42,74,0.08)}
    body{font-family:'Inter',sans-serif;color:var(--blue);background:radial-gradient(42% 30% at 4% 3%, #011C4B 0%, transparent 55%),radial-gradient(42% 30% at 96% 4%, #B48841 0%, transparent 55%),radial-gradient(46% 32% at 97% 50%, #0C8B9D 0%, transparent 58%),radial-gradient(46% 32% at 3% 55%, #01462E 0%, transparent 58%),radial-gradient(40% 26% at 50% 98%, #FB740B 0%, transparent 55%),linear-gradient(180deg,#eef3f0 0%,#e6efeb 100%);background-attachment:fixed}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    /* ── NAV BAR ── */
    #blog-nav{
      position:sticky;top:0;z-index:200;
      background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      height:64px;display:flex;align-items:center;
      justify-content:space-between;gap:12px;padding:0 24px;
    }
    .nav-logo{font-size:22px;font-weight:900;color:var(--blue);letter-spacing:-.03em;flex-shrink:0;text-decoration:none;cursor:pointer}
    .nav-logo span{color:var(--green-l)}
    .nav-center{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .nav-arrow{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--gray);border:1.5px solid var(--border);
      color:var(--blue);font-size:13px;font-weight:700;
      padding:8px 16px;border-radius:100px;cursor:pointer;
      transition:all .2s;white-space:nowrap;
    }
    .nav-arrow:hover:not(:disabled){background:var(--blue);color:#fff;border-color:var(--blue)}
    .nav-arrow:disabled{opacity:.35;cursor:not-allowed}
    .nav-arrow svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;fill:none}
    .nav-web{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--blue);color:#fff;
      font-size:13px;font-weight:700;
      padding:9px 18px;border-radius:100px;
      transition:background .2s;flex-shrink:0;white-space:nowrap;
    }
    .nav-web:hover{background:var(--green-l)}
    .nav-web svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;fill:none}

    /* ── HERO ── */
    #blog-hero{background:transparent;padding:72px 24px 60px;text-align:center}
    .kv-eyebrow{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--green-l);text-transform:uppercase;margin-bottom:16px}
    #blog-hero h1{font-size:clamp(26px,5vw,42px);font-weight:900;color:var(--blue);letter-spacing:-.03em;line-height:1.1;margin-bottom:14px}
    #blog-hero h1 span{color:var(--green-l)}
    #blog-hero p{font-size:15px;color:rgba(27,42,74,0.6);max-width:600px;margin:0 auto;line-height:1.6}

    /* ── FEATURED SECTION ── */
    #featured{background:transparent;display:none}
    .featured-inner{max-width:860px;margin:0 auto;padding:56px 24px 52px}
    .featured-eyebrow{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--green-l);margin-bottom:14px}
    .featured-cat-badge{
      display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
      color:#fff;background:var(--blue);border-radius:100px;padding:4px 12px;margin-bottom:18px;
    }
    .featured-emoji{font-size:48px;margin-bottom:16px;line-height:1}
    .featured-title{font-size:clamp(20px,4vw,32px);font-weight:900;color:var(--blue);line-height:1.2;letter-spacing:-.02em;margin-bottom:18px}
    .featured-excerpt{font-size:15px;line-height:1.75;color:rgba(27,42,74,0.72);margin-bottom:20px;max-width:700px}
    .featured-meta{font-size:12px;color:rgba(27,42,74,0.45);margin-bottom:28px}
    .featured-btn{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--blue);color:#fff;
      font-size:14px;font-weight:700;
      padding:12px 28px;border-radius:100px;
      transition:background .2s;
    }
    .featured-btn:hover{background:var(--green-l)}
    .featured-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;fill:none}

    /* ── FILTER + GRID ── */
    .section-articles{padding:52px 24px 72px}
    .kv-wrap{max-width:1100px;margin:0 auto}
    .kv-cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
    .kv-cat{
      padding:8px 18px;border-radius:100px;font-size:13px;font-weight:600;
      border:1.5px solid var(--border);color:rgba(27,42,74,0.55);
      background:none;cursor:pointer;transition:all .2s;
    }
    .kv-cat.active,.kv-cat:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
    .kv-grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

    /* ── BLOG CARD ── */
    .blog-card{
      background:rgba(255,255,255,0.42);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.7);border-radius:16px;
      padding:24px;box-shadow:0 30px 70px rgba(27,42,74,0.12), inset 0 1px 0 rgba(255,255,255,0.85);
      display:flex;flex-direction:column;cursor:pointer;
      transition:box-shadow .2s,border-color .2s;
    }
    .blog-card:hover{box-shadow:0 6px 24px rgba(27,42,74,0.12);border-color:rgba(27,42,74,0.18)}
    .blog-card.active{border-color:var(--green-l);box-shadow:0 4px 20px rgba(61,191,160,0.18)}
    .blog-emoji{font-size:36px;margin-bottom:12px}
    .blog-cat{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--green-l);margin-bottom:8px}
    .blog-title{font-size:14px;font-weight:800;color:var(--blue);line-height:1.35;margin-bottom:10px}
    .blog-excerpt{font-size:13px;color:rgba(27,42,74,0.6);line-height:1.6;flex:1}
    .blog-meta{margin-top:16px;font-size:11px;color:rgba(27,42,74,0.4);display:flex;justify-content:space-between}

    /* ── MOBILE ── */
    @media(max-width:640px){
      #blog-nav{height:auto;padding:10px 16px;flex-wrap:wrap;gap:8px}
      .nav-logo{font-size:19px}
      .nav-center{order:2;width:100%;justify-content:center}
      .nav-web{order:1;font-size:12px;padding:7px 14px}
      .nav-arrow{font-size:12px;padding:7px 12px}
      .featured-inner{padding:40px 16px 36px}
    }
  </style>
<style id="kivo-nohover">
/* KIVO: sin efecto hover en botones (solo hundido al pulsar) */
html button:hover,html [role="button"]:hover,html [class*="btn"]:hover,html [class*="button"]:hover,html [class*="cta"]:hover,html [class*="boton"]:hover,html .portal-tile:hover,html .kivo-fab-main:hover,html .kivo-fab-option:hover,html #kivo-top-btn:hover,html .s04-cta-btn:hover{transform:none!important;filter:none!important;}
</style>
<style id="kivo-press-fx">
/* Efecto PULSADO (hundido) — gana a los hover (KIVO) */
html button:active,html [role="button"]:active,html [onclick]:active,html input[type="submit"]:active,html input[type="button"]:active,html input[type="reset"]:active,html [class*="btn"]:active,html [class*="button"]:active,html [class*="cta"]:active,html [class*="boton"]:active,html [class*="tile"]:active,html [class*="chip"]:active,html .plan-selector:active,html .excl-item:active,html .otile:active,html .wtile:active,html .pbtn:active,html .sbtn:active,html .editbtn:active{transform:translateY(3px) scale(0.98)!important;box-shadow:0 2px 8px rgba(27,42,74,0.12),inset 0 3px 9px rgba(27,42,74,0.16)!important;transition:transform .06s ease,box-shadow .06s ease!important;}
</style>
</head>
<body>

<!-- ── NAV BAR ── -->
<nav style="position:sticky;top:0;z-index:200;display:flex;align-items:center;padding:12px 24px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(27,42,74,0.08)"><a href="../index.html" style="display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:#1B2A4A;text-decoration:none;padding:9px 18px;border:1.5px solid rgba(27,42,74,0.15);border-radius:100px;background:rgba(255,255,255,0.55)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>Volver a la web</a></nav>

<!-- ── HERO (visible cuando no hay artículo seleccionado) ── -->
<div id="blog-hero">
  <div class="kv-eyebrow">BLOG KIVO</div>
  <h1>Consejos, legislación y <span>cuidados</span></h1>
  <p>Todo lo que necesitas saber para cuidar mejor a tu compañero de vida.</p>
</div>

<!-- ── ARTÍCULO DESTACADO ── -->
<div id="featured"></div>

<!-- ── FILTROS + GRID ── -->
<div class="section-articles">
  <div class="kv-wrap">

    <div class="kv-cats">
      <button class="kv-cat active" onclick="filterGrid('Todos', this)">Todos</button>
      <button class="kv-cat" onclick="filterGrid('Legislación', this)">Legislación</button>
      <button class="kv-cat" onclick="filterGrid('Salud', this)">Salud</button>
      <button class="kv-cat" onclick="filterGrid('Cuidados', this)">Cuidados</button>
      <button class="kv-cat" onclick="filterGrid('Seguros', this)">Seguros</button>
    </div>

    <div class="kv-grid-3" id="articles-grid"></div>

  </div>
</div>

<script>
var ARTICLES = [
  {
    id: 'ley-bienestar', cat: 'Legislación', emoji: '⚖️',
    title: 'Ley 7/2023 de Bienestar Animal: todo lo que debes saber como dueño de un perro o gato',
    excerpt: 'La Ley de Bienestar Animal establece nuevas obligaciones para los propietarios de animales de compañía en España: seguro obligatorio de RC, microchip, y restricciones en razas PPP. Te explicamos qué cambia y qué debes hacer.',
    date: 'Junio 2025', read: '5 min', page: 'blog-ley-bienestar.html'
  },
  {
    id: 'seguro-rc', cat: 'Legislación', emoji: '📋',
    title: 'Seguro de Responsabilidad Civil para perros: obligatorio desde 2024',
    excerpt: 'Con la entrada en vigor de la Ley 7/2023, todos los propietarios de perros en España están obligados a contratar un seguro de RC. Te explicamos qué cubre, cuánto cuesta y cómo cumplir con la normativa.',
    date: 'Mayo 2025', read: '4 min', page: null
  },
  {
    id: 'leishmaniosis', cat: 'Salud', emoji: '🦟',
    title: 'Leishmaniosis en perros: síntomas, tratamiento y prevención',
    excerpt: 'La leishmaniosis es una enfermedad parasitaria transmitida por la picadura del mosquito flebotomo. En España es endémica en muchas zonas. Aprende a reconocer los síntomas, cómo se trata y qué puedes hacer para prevenirla.',
    date: 'Abril 2025', read: '6 min', page: 'blog-leishmaniosis.html'
  },
  {
    id: 'salud-dental', cat: 'Salud', emoji: '🦷',
    title: 'Salud dental en perros y gatos: por qué es más importante de lo que crees',
    excerpt: 'El 80% de los perros mayores de 3 años tienen algún grado de enfermedad periodontal. La higiene dental no es estética, es salud. Te explicamos cómo cepillar los dientes de tu mascota y qué señales no debes ignorar.',
    date: 'Marzo 2025', read: '5 min', page: null
  },
  {
    id: 'viaje-coche', cat: 'Cuidados', emoji: '🚗',
    title: 'Cómo preparar a tu perro para viajar en coche sin estrés',
    excerpt: 'El viaje en coche puede ser estresante para muchos perros. Con la preparación adecuada, puedes convertir cada trayecto en una experiencia tranquila. Te damos los consejos clave para que tu perro viaje seguro y relajado.',
    date: 'Febrero 2025', read: '4 min', page: 'blog-viaje-coche.html'
  },
  {
    id: 'golpe-calor', cat: 'Cuidados', emoji: '☀️',
    title: 'Golpe de calor en mascotas: señales de alarma y qué hacer',
    excerpt: 'Los golpes de calor son una emergencia veterinaria. En verano, el riesgo aumenta especialmente en razas braquicéfalas. Aprende a reconocer los síntomas y actuar rápido antes de llegar al veterinario.',
    date: 'Enero 2025', read: '3 min', page: null
  },
  {
    id: 'seguro-mascotas', cat: 'Seguros', emoji: '🛡️',
    title: '¿Por qué contratar un seguro para tu mascota? 5 razones que no te esperabas',
    excerpt: 'Una operación de urgencias puede costar entre 1.500 € y 5.000 €. Un proceso oncológico, mucho más. El seguro de mascotas no es un gasto extra: es la diferencia entre poder dar a tu compañero el mejor tratamiento o tener que elegir.',
    date: 'Diciembre 2024', read: '4 min', page: 'blog-seguro-mascota.html'
  },
  {
    id: 'comparativa-planes', cat: 'Seguros', emoji: '📊',
    title: 'CARE vs CARE+ vs PREMIUM: ¿qué plan KIVO te conviene más?',
    excerpt: 'Los tres planes cubren accidentes, enfermedades y R.C., pero difieren en el porcentaje de reembolso, el límite anual y las coberturas adicionales. Esta guía te ayuda a elegir el que mejor se adapta a tu mascota y tu bolsillo.',
    date: 'Noviembre 2024', read: '5 min', page: null
  }
];

var currentIdx = -1;

function showArticle(id, scroll) {
  var idx = ARTICLES.findIndex(function(a) { return a.id === id; });
  if (idx === -1) return;
  currentIdx = idx;
  var a = ARTICLES[idx];

  history.replaceState(null, '', '#' + id);

  document.getElementById('blog-hero').style.display = 'none';
  var featured = document.getElementById('featured');
  featured.style.display = 'block';
  featured.innerHTML =
    '<div class="featured-inner">' +
      '<div class="featured-eyebrow">ARTÍCULO DESTACADO</div>' +
      '<div class="featured-cat-badge">' + a.cat + '</div>' +
      '<div class="featured-emoji">' + a.emoji + '</div>' +
      '<h1 class="featured-title">' + a.title + '</h1>' +
      '<p class="featured-excerpt">' + a.excerpt + '</p>' +
      '<div class="featured-meta">' + a.date + ' · ' + a.read + ' de lectura</div>' +
      (a.page
        ? '<a href="' + a.page + '" class="featured-btn">Leer artículo completo ' +
          '<svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>'
        : '') +
    '</div>';

  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === ARTICLES.length - 1);

  document.querySelectorAll('.blog-card').forEach(function(card) {
    card.classList.toggle('active', card.dataset.id === id);
  });

  if (scroll) window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevArticle() {
  if (currentIdx > 0) showArticle(ARTICLES[currentIdx - 1].id, true);
}

function nextArticle() {
  if (currentIdx < ARTICLES.length - 1) showArticle(ARTICLES[currentIdx + 1].id, true);
}

function filterGrid(cat, btn) {
  document.querySelectorAll('.kv-cat').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.blog-card').forEach(function(card) {
    card.style.display = (cat === 'Todos' || card.dataset.cat === cat) ? '' : 'none';
  });
}

function renderGrid() {
  var html = '';
  ARTICLES.forEach(function(a) {
    html +=
      '<article class="blog-card" data-id="' + a.id + '" data-cat="' + a.cat + '" ' +
        'onclick="showArticle(\'' + a.id + '\', true)">' +
        '<div class="blog-emoji">' + a.emoji + '</div>' +
        '<div class="blog-cat">' + a.cat + '</div>' +
        '<h2 class="blog-title">' + a.title + '</h2>' +
        '<p class="blog-excerpt">' + a.excerpt + '</p>' +
        '<div class="blog-meta">' +
          '<span>' + a.date + ' · ' + a.read + ' de lectura</span>' +
          '<span style="color:#3DBFA0;font-weight:600">Leer →</span>' +
        '</div>' +
      '</article>';
  });
  document.getElementById('articles-grid').innerHTML = html;
}

renderGrid();

var hash = window.location.hash.slice(1);
if (hash) {
  showArticle(hash, false);
}
</script>
</body>
</html>
